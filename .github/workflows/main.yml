name: 🚀 Freedom Force 3D Factory

on:
  workflow_dispatch: # Allows manual trigger
  push:
    branches: [ main ] # Auto-updates the apps when you change code

jobs:
  deploy-factory:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Modal
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: 🏭 Deploy 3D Factory Suite
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          # Deploying ensures n8n can trigger these anytime without you
          modal deploy factory.py
          modal deploy freedom_world.py
