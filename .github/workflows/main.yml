name: 🚀 Freedom Force 3D Factory

on:
  # Allows you to click a button to start the factory manually
  workflow_dispatch:

jobs:
  run-factory:
    runs-on: ubuntu-latest
    timeout-minutes: 45 # ⏳ THE FIX: Forces GitHub to wait for the C++ Compiler
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Modal
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: 🏭 Trigger Modal Factory
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          # This runs the factory.py file using the Modal Cloud
          modal run factory.py
