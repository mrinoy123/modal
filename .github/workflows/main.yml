name: 🚀 Freedom Force 3D Factory

on:
  workflow_dispatch:
    inputs:
      target_script:
        description: 'Which part of the factory are we running?'
        required: true
        default: 'world'
        type: choice
        options:
          - objects (factory.py)
          - world (freedom_world.py)

jobs:
  execute-modal:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Modal
        run: pip install modal

      - name: 🏭 Run Selected Script
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          # Only runs the ONE file you select in the dropdown
          if [ "${{ github.event.inputs.target_script }}" == "objects (factory.py)" ]; then
            modal run factory.py
          else
            modal run freedom_world.py
          fi
