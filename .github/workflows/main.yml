name: 🚀 Freedom Force 3D Factory

on:
  workflow_dispatch:
    inputs:
      target_script:
        description: 'Which part of the factory are we running?'
        required: true
        default: 'world'
        type: choice
        options:
          - objects (factory.py)
          - world (freedom_world.py)
          - hallucinate (hunyuan-world-v1.py)
          - ltx (ltx_video_generator.py) # <--- NEW OPTION

jobs:
  execute-modal:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Modal
        run: pip install modal

      - name: 🏭 Run Selected Script
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          case "${{ github.event.inputs.target_script }}" in
            "objects (factory.py)")
              echo "🛠️ Launching Object Factory..."
              modal run factory.py
              ;;
            "world (freedom_world.py)")
              echo "🌍 Launching World Builder..."
              modal run freedom_world.py
              ;;
            "hallucinate (hunyuan-world-v1.py)")
              echo "✨ Launching HunyuanWorld v1 Hallucination Engine..."
              modal run hunyuan-world-v1.py
              ;;
            "ltx (ltx_video_generator.py)")
              echo "🎥 Launching LTX-Video High-Motion Engine..."
              modal run ltx_video_generator.py
              ;;
            *)
              echo "❌ Error: Unknown script selection."
              exit 1
              ;;
          esac
